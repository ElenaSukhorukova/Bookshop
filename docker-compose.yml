services:

  redis:
    image: 'bitnami/redis:latest'
    command: redis-server
    volumes:
      - redis_data:/data
    environment:
      REDIS_ALLOW_EMPTY_PASSWORD: ${REDIS_ALLOW_EMPTY_PASSWORD}
      REDIS_HOST: ${REDIS_HOST}
    ports:
      - '6379:6379'

  postgresql:
    image: 'postgres:latest'
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5433:5432'

  business:
    image: business:latest
    build: ./business
    restart: always
    ports:
      - '3000:3000'
    volumes:
      - .:/business
    environment:
      RAILS_ENV: ${RAILS_ENV}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
    depends_on:
      - redis
      - postgresql

  buisness-sidekiq:
    image: buisness-sidekiq:latest
    build: ./business
    command: bundle exec sidekiq
    volumes:
      - .:/business
    environment:
      RAILS_ENV: ${RAILS_ENV}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
    depends_on:
      - redis

  business-front:
    image: business-front:latest
    build: ./business-front
    ports:
      - "5000:3000"
    volumes:
     - .:/business-front
     - ./business-front/node_modules:/business-front/node_modules
    environment:
      NODE_ENV: development
    stdin_open: true
    tty: true
    command: npm start

  core:
    image: core
    build: ./core
    ports:
      - '4000:3000'
    volumes:
      - .:/core
    environment:
      RAILS_ENV: ${RAILS_ENV}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
    depends_on:
      - postgresql
      - redis

volumes:
  postgres_data:
  redis_data:
